<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            background-color: #51a1f7;
            color: white;
            border: 5px solid rgb(0, 38, 255);
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 15px;
        }

        ul {
            margin-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>

      <p>Explore our website to learn more about our services, team, and contact information.</p>

        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Contact</li>
        </ul>
    </div>

</body>
</html>
