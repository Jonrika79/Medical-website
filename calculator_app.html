<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator App</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-900 via-indigo-800 to-purple-900">

<div class="bg-white/10 backdrop-blur-lg rounded-3xl p-6 shadow-2xl w-80">

    <h1 class="text-white text-center text-3xl font-bold mb-5">
        Calculator App
    </h1>

    <input
        id="screen"
        type="text"
        readonly
        placeholder="0"
        class="w-full h-16 rounded-xl bg-slate-900 text-cyan-300 text-right text-3xl px-4 mb-5 outline-none"
    >

    <div class="grid grid-cols-4 gap-3">

        <button onclick="resetScreen()" class="bg-red-500 hover:bg-red-600 text-white rounded-xl h-14">AC</button>

        <button onclick="removeLast()" class="bg-yellow-500 hover:bg-yellow-600 text-white rounded-xl h-14">DEL</button>

        <button onclick="addValue('%')" class="bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl h-14">%</button>

        <button onclick="addValue('/')" class="bg-purple-500 hover:bg-purple-600 text-white rounded-xl h-14">÷</button>

        <button onclick="addValue('7')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">7</button>

        <button onclick="addValue('8')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">8</button>

        <button onclick="addValue('9')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">9</button>

        <button onclick="addValue('*')" class="bg-purple-500 hover:bg-purple-600 text-white rounded-xl h-14">×</button>

        <button onclick="addValue('4')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">4</button>

        <button onclick="addValue('5')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">5</button>

        <button onclick="addValue('6')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">6</button>

        <button onclick="addValue('-')" class="bg-purple-500 hover:bg-purple-600 text-white rounded-xl h-14">−</button>

        <button onclick="addValue('1')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">1</button>

        <button onclick="addValue('2')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">2</button>

        <button onclick="addValue('3')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">3</button>

        <button onclick="addValue('+')" class="bg-purple-500 hover:bg-purple-600 text-white rounded-xl h-14">+</button>

        <button onclick="addValue('0')" class="col-span-2 bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">0</button>

        <button onclick="addValue('.')" class="bg-slate-700 hover:bg-slate-600 text-white rounded-xl h-14">.</button>

        <button onclick="findAnswer()" class="bg-cyan-500 hover:bg-cyan-600 text-white rounded-xl h-14 font-bold">=</button>

    </div>

</div>

<script>

const screen = document.getElementById("screen");

function addValue(value){
    screen.value += value;
}

function resetScreen(){
    screen.value = "";
}

function removeLast(){
    screen.value = screen.value.substring(0, screen.value.length - 1);
}

function findAnswer(){
    try{
        screen.value = Function("return " + screen.value)();
    }
    catch{
        screen.value = "Invalid";
    }
}

</script>

</body>
</html>
